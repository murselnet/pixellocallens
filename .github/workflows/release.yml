name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read App Version
        id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check Existing Release
        id: release_check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $exists = $true
          gh release view $tag --repo "${{ github.repository }}" 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            $exists = $false
            $global:LASTEXITCODE = 0
          }

          if ($exists) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "Release $tag already exists. Skipping build and publish." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Install Dependencies
        if: steps.release_check.outputs.exists != 'true'
        run: npm ci

      - name: Build Windows Release
        if: steps.release_check.outputs.exists != 'true'
        run: npm run dist:ci

      - name: Normalize Release Asset Names
        if: steps.release_check.outputs.exists != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          Copy-Item "release/PixelLocalLens Desktop Setup $version.exe" "release/PixelLocalLens-Desktop-Setup-$version.exe" -Force
          Copy-Item "release/PixelLocalLens Desktop Setup $version.exe.blockmap" "release/PixelLocalLens-Desktop-Setup-$version.exe.blockmap" -Force

      - name: Publish GitHub Release
        if: steps.release_check.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $exePath = "release/PixelLocalLens-Desktop-Setup-$version.exe"
          $blockmapPath = "release/PixelLocalLens-Desktop-Setup-$version.exe.blockmap"

          gh release create $tag `
            "release/latest.yml" `
            "$exePath" `
            "$blockmapPath" `
            --repo "${{ github.repository }}" `
            --title "$version" `
            --target "${{ github.sha }}" `
            --latest `
            --generate-notes

          "Published release $tag with Windows installer assets." >> $env:GITHUB_STEP_SUMMARY
